    <!-- ── Primary SEO ── -->
    <title>Rinkya Designs — Freelance Designer · 3D Artist · Video Editor · India</title>
    <meta name="description" content="Rinkya Designs — Freelance creative designer based in India. Specialising in brand identity, logo design, 3D modeling, NFT art, video editing, illustrations and poster design. Available worldwide." />

    <meta property="og:locale"      content="en_IN" />

    <meta name="twitter:card"       content="summary_large_image" />

    <!-- ── Structured Data — tells Google she's a freelancer ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Rinkya Designs",
      "url": "https://rinkyadesigns.com",
      "description": "Freelance graphic designer, 3D artist and video editor based in India",
      "image": "https://rinkyadesigns.com/og-image.jpg",
      "sameAs": [
        "https://instagram.com/",
        "https://behance.net/",
        "https://linkedin.com/",
        "https://dribbble.com/"
      ],
      "jobTitle": "Freelance Creative Designer",
      "knowsAbout": [
        "Graphic Design",
        "Brand Identity",
        "Logo Design",
        "3D Modeling",
        "NFT Art",
        "Video Editing",
        "Illustration",
        "Poster Design",
        "Adobe Photoshop",
        "Adobe Illustrator",
        "Maya",
        "Blender"
      ],
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "IN"
      },
      "offers": {
        "@type": "Offer",
        "description": "Freelance design services — branding, 3D, video editing, illustration",

      }
    }
